<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ecosystem - Integration marketplace and partner network">
  <title>Ecosystem - Executive Analytics Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div id="nav-container"></div>
  
  <section class="bg-gradient-to-r from-indigo-900 to-indigo-700 text-white py-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">Ecosystem</h1>
      <p class="text-xl text-indigo-100">Seamlessly integrate with your existing technology stack</p>
    </div>
  </section>
  
  <!-- Integration Categories -->
  <section class="py-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold mb-12 text-center text-gray-900">Integration Categories</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="bg-white p-8 rounded-lg shadow-md">
          <h3 class="text-2xl font-bold mb-4 text-gray-900">ERP Systems</h3>
          <p class="text-gray-600">SAP, Oracle, NetSuite, Microsoft Dynamics</p>
        </div>
        
        <div class="bg-white p-8 rounded-lg shadow-md">
          <h3 class="text-2xl font-bold mb-4 text-gray-900">CRM Platforms</h3>
          <p class="text-gray-600">Salesforce, HubSpot, Microsoft Dynamics</p>
        </div>
        
        <div class="bg-white p-8 rounded-lg shadow-md">
          <h3 class="text-2xl font-bold mb-4 text-gray-900">Cloud Infrastructure</h3>
          <p class="text-gray-600">AWS, Azure, Google Cloud Platform</p>
        </div>
        
      </div>
    </div>
  </section>
  

  
  <div id="footer-container"></div>
  <script src="../js/nav.js"></script>
</body>
</html>
